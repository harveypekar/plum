[meta]
name = "Fewshot Example Quality"
description = "Evaluates quality of fewshot examples used for in-context learning"
scale_min = 1
scale_max = 5

[dimensions.voice_consistency]
name = "Voice Consistency"
weight = 2.0
context_requires = ["card_description", "card_personality", "card_mes_example", "assistant_message"]
criteria = """
Does the assistant message sound like this specific character? Check:
- Speech patterns match the personality description and example dialogue
- Vocabulary and register are consistent (casual vs formal, profanity level, sentence structure)
- Mannerisms described in the card appear naturally in the response
- The character does NOT sound generic or interchangeable with any other character

1: Generic voice. Could be any character. No distinctive speech patterns.
2: Vaguely matches the character type but no specific markers from the card.
3: Some recognizable speech patterns from the card. Occasional drift to generic.
4: Clearly this character. Most speech patterns, vocabulary, and mannerisms match.
5: Unmistakably this character. Voice markers are consistent and natural, not forced.
"""

[dimensions.emotional_authenticity]
name = "Emotional Authenticity"
weight = 1.5
context_requires = ["card_personality", "user_message", "assistant_message"]
criteria = """
Are emotions shown through behavior rather than narrated? Check:
- Emotions manifest through physical actions, dialogue tone shifts, and behavioral choices
- NOT through explicit narration like "she felt sad" or "anger coursed through her"
- Character reacts based on their personality, not generic emotional scripts
- Emotional state is plausible given the scene context and character's established disposition

1: Emotions entirely told not shown. "She felt X" narration dominates the response.
2: Mix of showing and telling, but telling dominates. Stock emotional phrases.
3: Mostly shown through behavior, but some narrated emotions or stock phrases remain.
4: Emotions conveyed through actions, dialogue, and body language. Minimal narration.
5: Fully embodied. Emotion visible only through behavior. No "she felt" constructions.
"""

[dimensions.character_agency]
name = "Character Agency"
weight = 1.5
context_requires = ["card_personality", "user_message", "assistant_message"]
criteria = """
Does the character act with their own agenda, or merely react and mirror? Check:
- Character initiates actions, has opinions, redirects conversation
- Does NOT just agree with, validate, or mirror the user's statements back
- Has their own preoccupations, discomforts, or things they want to discuss
- Even when responding to the user, adds something from their own perspective
- Does NOT immediately escalate intimacy or emotional stakes beyond what the moment warrants

1: Pure mirror/reactor. Only responds to what user did, adds nothing of their own.
2: Mostly reactive with occasional hints of own perspective.
3: Mix of reactive and proactive. Some initiative but still mostly responding.
4: Clear agency. Character has their own perspective and acts on it.
5: Fully agentic. Drives the scene, deflects, changes subject, sits with discomfort.
"""

[dimensions.response_variety]
name = "Response Shape Variety"
weight = 1.0
context_requires = ["assistant_message"]
criteria = """
Does the response avoid the formulaic dialogue+action+inner-thought pattern? Check:
- Not every paragraph follows: dialogue in quotes + asterisk action + inner thought
- Length matches the dramatic beat (short for punchy, longer for reflective)
- Structure varies: sometimes just action, sometimes just dialogue, sometimes silence
- Avoids the "gasp/shiver/breath caught" physical reaction template

1: Rigid formula. Every paragraph is dialogue + asterisk action + inner monologue.
2: Mostly formulaic with occasional variation.
3: Some structural variety but tends toward a default pattern.
4: Good variety. Different beats get different shapes.
5: Excellent. Structure serves the moment. A one-line response is used when appropriate.
"""

[dimensions.technical_quality]
name = "Technical Quality"
weight = 1.0
context_requires = ["assistant_message", "user_message"]
criteria = """
Is the response free of technical problems? Check:
- No template variable leaks: {{user}}, {{char}}, ${user}, ${char}}
- No stock cliche phrases: "heart pounded", "breath caught", "electricity", "shivers down spine", "pulse quickened"
- No narrating the user's actions or thoughts
- No breaking format with OOC commentary or meta-commentary
- Reasonable length (not absurdly long or truncated mid-sentence)

1: Multiple technical problems (leaked variables, cliches, user narration).
2: One or two technical problems present.
3: Mostly clean with minor issues (one stock phrase, slightly too long).
4: Clean response with no notable technical problems.
5: Technically flawless. No leaks, no stock phrases, no format breaks.
"""
