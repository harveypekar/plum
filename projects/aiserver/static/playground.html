<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aiserver — Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Consolas', 'Monaco', monospace;
    background: #0d1117;
    color: #c9d1d9;
    padding: 20px;
  }
  h1 { color: #58a6ff; margin-bottom: 8px; font-size: 1.4em; }
  .subtitle { color: #8b949e; margin-bottom: 24px; font-size: 0.9em; }
  nav { margin-bottom: 24px; }
  nav a {
    color: #58a6ff;
    text-decoration: none;
    margin-right: 16px;
    font-size: 0.9em;
  }
  nav a:hover { text-decoration: underline; }
  nav a.active { color: #f0f6fc; border-bottom: 2px solid #58a6ff; padding-bottom: 2px; }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  label {
    font-size: 0.75em;
    color: #8b949e;
    text-transform: uppercase;
  }
  select, input[type="number"] {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    color: #c9d1d9;
    padding: 8px;
    font-family: inherit;
    font-size: 0.9em;
  }
  select:focus, input:focus, textarea:focus {
    outline: none;
    border-color: #58a6ff;
  }
  .checkbox-group {
    flex-direction: row;
    align-items: center;
    gap: 8px;
    padding-top: 20px;
  }
  input[type="checkbox"] { width: 16px; height: 16px; }

  .system-prompt {
    margin-bottom: 12px;
  }
  .system-prompt textarea {
    width: 100%;
    height: 60px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    color: #c9d1d9;
    padding: 8px;
    font-family: inherit;
    font-size: 0.9em;
    resize: vertical;
  }

  .prompt-area {
    margin-bottom: 16px;
  }
  textarea#prompt {
    width: 100%;
    height: 120px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    padding: 12px;
    font-family: inherit;
    font-size: 0.9em;
    resize: vertical;
  }

  .actions {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  button {
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 20px;
    font-family: inherit;
    font-size: 0.9em;
    cursor: pointer;
  }
  button:hover { background: #2ea043; }
  button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  button.stop { background: #da3633; }
  button.stop:hover { background: #f85149; }
  .stats-line { font-size: 0.8em; color: #8b949e; }

  .output-container {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 16px;
    min-height: 200px;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.5;
  }
  .thinking-section {
    margin-bottom: 12px;
    border-left: 3px solid #30363d;
    padding-left: 12px;
  }
  .thinking-toggle {
    font-size: 0.8em;
    color: #8b949e;
    cursor: pointer;
    user-select: none;
    margin-bottom: 4px;
  }
  .thinking-content {
    color: #6e7681;
    font-style: italic;
    font-size: 0.9em;
  }
  .thinking-content.collapsed { display: none; }
</style>
</head>
<body>
  <h1>aiserver</h1>
  <p class="subtitle">Prompt playground</p>
  <nav>
    <a href="/static/index.html">Dashboard</a>
    <a href="/static/playground.html" class="active">Playground</a>
  </nav>

  <div class="controls">
    <div class="control-group">
      <label for="model">Model</label>
      <select id="model"></select>
    </div>
    <div class="control-group">
      <label for="temperature">Temperature</label>
      <input type="number" id="temperature" step="0.1" min="0" max="2">
    </div>
    <div class="control-group">
      <label for="numPredict">Max Tokens</label>
      <input type="number" id="numPredict" min="1" max="32768">
    </div>
    <div class="control-group">
      <label for="topP">Top P</label>
      <input type="number" id="topP" step="0.05" min="0" max="1">
    </div>
    <div class="control-group">
      <label for="topK">Top K</label>
      <input type="number" id="topK" min="1" max="200">
    </div>
    <div class="control-group checkbox-group">
      <input type="checkbox" id="think">
      <label for="think" style="text-transform:none;color:#c9d1d9">Enable thinking</label>
    </div>
  </div>

  <div class="system-prompt">
    <label for="systemPrompt">System Prompt</label>
    <textarea id="systemPrompt" placeholder="Optional system prompt..."></textarea>
  </div>

  <div class="prompt-area">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="Type your prompt here..."></textarea>
  </div>

  <div class="actions">
    <button id="generateBtn">Generate</button>
    <button id="stopBtn" class="stop" style="display:none">Stop</button>
    <span class="stats-line" id="statsLine"></span>
  </div>

  <div class="output-container" id="output"></div>

  <script src="playground.js"></script>
</body>
</html>
