<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⌈ GAME LAB ⌉</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #00ff41; --green-dim: #00ff4180; --green-dark: #00ff4130;
  --amber: #ffb000; --amber-dim: #ffb00080;
  --cyan: #00ffff; --red: #ff4444; --orange: #ff8c00;
  --bg: #0a0a0a; --bg-panel: #0d0d0d; --bg-card: #111; --border: #00ff4140;
  --font: 'Courier New', 'Consolas', monospace;
}
html, body { height: 100%; background: var(--bg); color: var(--green); font-family: var(--font); font-size: 18px; overflow: hidden; }
.glow { text-shadow: 0 0 5px var(--green-dim), 0 0 15px var(--green-dark); }
.glow-amber { text-shadow: 0 0 5px var(--amber-dim); }

#top-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px; border-bottom: 1px solid var(--border); background: var(--bg); height: 44px; flex-shrink: 0; }
#top-bar h1 { font-family: var(--font); font-size: 26px; font-weight: normal; letter-spacing: 4px; color: var(--green); }

#main { display: flex; height: calc(100% - 44px); }

/* Resize handles */
.resize-handle { width: 5px; cursor: col-resize; background: var(--border); flex-shrink: 0; transition: background 0.15s; }
.resize-handle:hover, .resize-handle.active { background: var(--green); }

#gallery { width: 280px; min-width: 150px; overflow-y: auto; padding: 8px; flex-shrink: 0; }
.cat-header { font-family: var(--font); font-size: 18px; color: var(--amber); padding: 12px 4px 4px; letter-spacing: 2px; }
.snippet-card { border: none; margin: 2px 0; padding: 6px 8px; cursor: pointer; transition: all 0.15s; background: transparent; border-left: 2px solid transparent; }
.snippet-card:hover { border-left-color: var(--green); background: #00ff4108; }
.snippet-card .title { font-size: 16px; color: var(--green); margin-bottom: 2px; }
.snippet-card .desc { font-size: 14px; color: var(--green-dim); margin-bottom: 4px; }
.snippet-card .card-actions { display: flex; gap: 4px; }
.snippet-card .code-preview { display: none; margin-top: 6px; padding: 6px; background: var(--bg); border: 1px solid var(--border); font-family: var(--font); font-size: 13px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; color: var(--green-dim); }
.snippet-card.expanded .code-preview { display: block; }

#editor-panel { flex: 1; display: flex; flex-direction: column; min-width: 300px; }
#tab-bar { display: flex; gap: 0; overflow-x: auto; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { display: flex; align-items: center; gap: 4px; padding: 4px 10px; font-family: var(--font); font-size: 14px; color: var(--green-dim); cursor: pointer; border-right: 1px solid var(--border); background: transparent; white-space: nowrap; transition: all 0.15s; border: none; border-right: 1px solid var(--border); }
.tab:hover { color: var(--green); background: #00ff4108; }
.tab.active { color: var(--green); background: var(--green-dark); }
.tab .tab-close { margin-left: 4px; font-size: 12px; opacity: 0.5; cursor: pointer; }
.tab .tab-close:hover { opacity: 1; color: var(--amber); }
#editor-container { flex: 1; overflow: hidden; }
#editor-container .CodeMirror { height: 100%; background: var(--bg) !important; color: var(--green) !important; font-family: var(--font) !important; font-size: 16px; line-height: 1.4; }
.CodeMirror-cursor { border-left: 2px solid var(--green) !important; }
.CodeMirror-selected { background: var(--green-dark) !important; }
.CodeMirror-gutters { background: var(--bg) !important; border-right: 1px solid var(--border) !important; }
.CodeMirror-linenumber { color: var(--green-dim) !important; font-family: var(--font) !important; }
/* Syntax colors: keywords=cyan, numbers=cyan, function names=red, function calls=orange */
.cm-s-default .cm-keyword { color: var(--cyan) !important; }
.cm-s-default .cm-number { color: var(--cyan) !important; }
.cm-s-default .cm-string { color: var(--amber) !important; }
.cm-s-default .cm-comment { color: #00ff41 !important; font-style: italic; }
.cm-s-default .cm-def { color: var(--red) !important; }
.cm-s-default .cm-variable { color: var(--amber) !important; }
.cm-s-default .cm-variable-2 { color: var(--amber) !important; }
.cm-s-default .cm-property { color: var(--orange) !important; }
.cm-s-default .cm-operator { color: var(--cyan) !important; }
.cm-s-default .cm-atom { color: var(--cyan) !important; }
.CodeMirror-activeline-background { background: #00ff4108 !important; }
.cm-s-default .cm-matchingbracket { color: var(--amber) !important; text-decoration: underline; }
.line-highlight { background: #ffb00020 !important; }

#btn-row { display: flex; gap: 4px; padding: 4px 8px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--bg); flex-wrap: wrap; }
.btn { background: transparent; border: 1px solid var(--border); color: var(--green); font-family: var(--font); font-size: 16px; padding: 3px 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn:hover { background: var(--green-dark); box-shadow: 0 0 8px var(--green-dark); }
.btn-amber { border-color: var(--amber-dim); color: var(--amber); }
.btn-amber:hover { background: #ffb00015; box-shadow: 0 0 8px #ffb00020; }

#console-container { height: 120px; min-height: 60px; overflow-y: auto; padding: 4px 8px; background: #050505; font-family: var(--font); font-size: 14px; border-top: 1px solid var(--border); }
.console-line { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
.console-line.log { color: var(--green-dim); }
.console-line.error { color: var(--amber); }
.console-line a { color: var(--amber); text-decoration: underline; cursor: pointer; }

#canvas-panel { width: 440px; min-width: 300px; display: flex; flex-direction: column; align-items: center; padding: 12px; flex-shrink: 0; }
#monitor-bezel { border: 3px solid #333; border-radius: 8px; padding: 8px; background: #1a1a1a; box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 15px var(--green-dark); position: relative; }
#canvas-container { position: relative; width: 400px; height: 400px; overflow: hidden; background: black; }
#canvas-container canvas { display: block !important; }

#tweaks-panel { width: 100%; max-width: 416px; margin-top: 8px; max-height: 250px; overflow-y: auto; }
#timer-panel { text-align: center; padding: 8px 0 4px; }
#timer-label { font-family: var(--font); font-size: 11px; color: #ff8888; letter-spacing: 3px; margin-bottom: 2px; }
#timer-display { font-family: 'DSEG7 Classic', var(--font); font-size: 32px; color: var(--red); letter-spacing: 2px; text-shadow: 0 0 8px #ff444460, 0 0 20px #ff444420; position: relative; display: inline-block; }
#timer-ghost { font-family: 'DSEG7 Classic', var(--font); font-size: 32px; color: #ff444412; letter-spacing: 2px; }
#timer-value { position: absolute; top: 0; left: 0; }
#tweaks-content { display: block; padding: 4px 0; }
.tweak-row { display: flex; align-items: center; gap: 8px; padding: 3px 4px; font-size: 15px; }
.tweak-row label { min-width: 140px; color: var(--green-dim); font-family: var(--font); }
/* Slider: green filled, amber unfilled */
.tweak-row input[type="range"] { flex: 1; -webkit-appearance: none; appearance: none; height: 6px; background: var(--amber); border-radius: 0; outline: none; }
.tweak-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--green); cursor: pointer; border: none; }
.tweak-row input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; background: var(--green); cursor: pointer; border: none; border-radius: 0; }
.tweak-row input[type="range"]::-webkit-slider-runnable-track { background: linear-gradient(to right, var(--green) 0%, var(--green) var(--val-pct, 50%), var(--amber) var(--val-pct, 50%), var(--amber) 100%); height: 6px; }
.tweak-row input[type="color"] { width: 30px; height: 24px; border: 1px solid var(--border); background: transparent; cursor: pointer; }
.tweak-row input[type="text"] { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--green); font-family: var(--font); padding: 2px 6px; }
.tweak-row .val-display { min-width: 40px; text-align: right; color: var(--green); font-family: var(--font); font-size: 14px; }
.toggle-switch { width: 40px; height: 20px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; position: relative; display: inline-block; }
.toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: var(--green-dim); transition: all 0.15s; }
.toggle-switch.on::after { left: 22px; background: var(--green); box-shadow: 0 0 5px var(--green); }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--green-dark); }
::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

#confirm-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
#confirm-overlay.show { display: flex; }
#confirm-box { border: 2px solid var(--amber); background: var(--bg); padding: 20px 30px; font-family: var(--font); font-size: 20px; color: var(--amber); text-align: center; box-shadow: 0 0 30px #ffb00030; }
#confirm-box .confirm-btns { margin-top: 16px; display: flex; gap: 12px; justify-content: center; }
</style>
</head>
<body>
<div id="top-bar">
  <h1 class="glow">⌈ GAME LAB ⌉</h1>
</div>
<div id="main">
  <div id="gallery"></div>
  <div class="resize-handle" id="resize-1"></div>
  <div id="editor-panel">
    <div id="tab-bar"></div>
    <div id="editor-container"><textarea id="editor"></textarea></div>
    <div id="btn-row">
      <button class="btn" id="btn-run" onclick="manualRun()">▶ RUN</button>
      <button class="btn btn-amber" id="btn-reset" onclick="confirmReset()">↺ RESET</button>
      <button class="btn" id="btn-undo" onclick="undo()">◄ UNDO</button>
      <button class="btn" id="btn-redo" onclick="redo()">► REDO</button>
      <button class="btn" id="btn-download" onclick="downloadHTML()">⬇ DOWNLOAD</button>
    </div>
    <div id="console-container"></div>
  </div>
  <div class="resize-handle" id="resize-2"></div>
  <div id="canvas-panel">
    <div id="monitor-bezel">
      <div id="canvas-container"></div>
    </div>
    <div id="tweaks-panel">
      <div id="timer-panel">
        <div id="timer-label">GAME TIME</div>
        <div id="timer-display"><span id="timer-ghost">88:88.88</span><span id="timer-value">00:00.00</span></div>
      </div>
      <div id="tweaks-content"></div>
    </div>
  </div>
</div>
<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="btn" id="confirm-y" onclick="confirmResolve(true)">[Y]</button>
      <button class="btn btn-amber" id="confirm-n" onclick="confirmResolve(false)">[N]</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

<script>
// NOTE: This is an in-browser code editor (like p5.js Web Editor, CodePen, JSFiddle).
// Dynamic code evaluation is the core purpose — all code runs client-side only.

// ============================================================
// CONFIGURATION
// ============================================================
var STARTER_CODE = [
  '// JOUW GAME / YOUR GAME',
  '',
  '// === LOGIC ===',
  'let x = 200;',
  'let y = 200;',
  '',
  '// === SETUP ===',
  'function setup() {',
  '  createCanvas(400, 400);',
  '}',
  '',
  '// === DRAW ===',
  'function draw() {',
  '  background(0);',
  '  fill(0, 255, 65);',
  '  circle(x, y, 30);',
  '}'
].join('\n');

// ============================================================
// I18N
// ============================================================
// Interface is always English. Only snippet descriptions are translated.
var STRINGS = {
  run: '\u25b6 RUN', reset: '\u21ba RESET', undo: '\u25c4 UNDO', redo: '\u25ba REDO',
  download: '\u2b07 DOWNLOAD', clear: 'CLEAR',
  confirmReset: 'THIS WILL REPLACE YOUR CODE. CONTINUE?',
  confirmTemplate: 'TEMPLATE WILL REPLACE YOUR CODE. CONTINUE?',
  infiniteLoop: 'Oneindige lus gestopt / Infinite loop stopped',
  errorPrefix: 'ERROR', copy: 'COPY', viewCode: 'CODE',
  movement: '> MOVEMENT', physics: '> PHYSICS', objects: '> OBJECTS',
  collision: '> COLLISION', visuals: '> VISUALS', input: '> INPUT',
  templates: '> GAME TEMPLATES', gameLogic: '> GAME LOGIC',
};
function t(key) { return STRINGS[key] || key; }

// ============================================================
// SNIPPETS DATA
// ============================================================
var SNIPPETS = [
  // --- MOVEMENT ---
  { id:'arrows', cat:'movement', template:false,
    title:'Arrow keys',
    desc:'Beweeg in 4 richtingen',
    logic:'// --- LOGIC: arrows ---\n// Beweeg met pijltjestoetsen (arrow keys)\nlet arrows_speed_ui = 3; // Snelheid (speed) min:1 max:10\n\nfunction arrows_move() {\n  if (keyIsDown(LEFT_ARROW)) x -= arrows_speed_ui;\n  if (keyIsDown(RIGHT_ARROW)) x += arrows_speed_ui;\n  if (keyIsDown(UP_ARROW)) y -= arrows_speed_ui;\n  if (keyIsDown(DOWN_ARROW)) y += arrows_speed_ui;\n}',
    draw:'arrows_move();' },
  { id:'wasd', cat:'movement', template:false,
    title:'WASD keys',
    desc:'Beweeg met W/A/S/D',
    logic:'// --- LOGIC: wasd ---\n// Beweeg met W/A/S/D toetsen\nlet wasd_speed_ui = 3; // Snelheid (speed) min:1 max:10\n\nfunction wasd_move() {\n  if (keyIsDown(65)) x -= wasd_speed_ui;\n  if (keyIsDown(68)) x += wasd_speed_ui;\n  if (keyIsDown(87)) y -= wasd_speed_ui;\n  if (keyIsDown(83)) y += wasd_speed_ui;\n}',
    draw:'wasd_move();' },
  { id:'mousefollow', cat:'movement', template:false,
    title:'Mouse follow',
    desc:'Vloeiend naar muispositie',
    logic:'// --- LOGIC: mousefollow ---\n// Volg de muis met vloeiende beweging (lerp = lineaire interpolatie)\nlet mousefollow_smooth_ui = 0.05; // Vloeiendheid (smoothing) min:0.01 max:0.3 step:0.01\n\nfunction mousefollow_update() {\n  x = lerp(x, mouseX, mousefollow_smooth_ui);\n  y = lerp(y, mouseY, mousefollow_smooth_ui);\n}',
    draw:'mousefollow_update();' },
  { id:'clickmove', cat:'movement', template:false,
    title:'Click to move',
    desc:'Klik ergens om erheen te gaan',
    logic:'// --- LOGIC: clickmove ---\n// Klik om een doel (target) te kiezen\nlet clickmove_targetX = 200;\nlet clickmove_targetY = 200;\nlet clickmove_speed_ui = 3; // Snelheid (speed) min:1 max:10\n\nfunction clickmove_update() {\n  let distanceX = clickmove_targetX - x;\n  let distanceY = clickmove_targetY - y;\n  let distance = sqrt(distanceX * distanceX + distanceY * distanceY);\n  if (distance > clickmove_speed_ui) {\n    x += (distanceX / distance) * clickmove_speed_ui;\n    y += (distanceY / distance) * clickmove_speed_ui;\n  }\n}\n\nfunction mousePressed() {\n  clickmove_targetX = mouseX;\n  clickmove_targetY = mouseY;\n}',
    draw:'clickmove_update();' },

  // --- PHYSICS ---
  { id:'gravity', cat:'physics', template:false,
    title:'Gravity',
    desc:'Object valt naar beneden',
    logic:'// --- LOGIC: gravity ---\n// Zwaartekracht: snelheid (velocity) neemt toe door versnelling (acceleration)\nlet gravity_velocity = 0;\nlet gravity_accel_ui = 0.5; // Zwaartekracht (gravity) min:0 max:2 step:0.1\nlet gravity_groundY = 380;\n\nfunction gravity_apply() {\n  gravity_velocity += gravity_accel_ui;\n  y += gravity_velocity;\n  if (y >= gravity_groundY) {\n    y = gravity_groundY;\n    gravity_velocity = 0;\n  }\n}',
    draw:'gravity_apply();' },
  { id:'jump', cat:'physics', template:false,
    title:'Jump',
    desc:'Druk spatie om te springen',
    logic:'// --- LOGIC: jump ---\n// Springen: geef een negatieve snelheid (velocity) omhoog\nlet jump_velocity = 0;\nlet jump_gravity_ui = 0.6; // Zwaartekracht (gravity) min:0 max:2 step:0.1\nlet jump_force_ui = -10; // Springkracht (jump force) min:-20 max:-2 step:0.5\nlet jump_groundY = 380;\nlet jump_onGround = true;\n\nfunction jump_apply() {\n  jump_velocity += jump_gravity_ui;\n  y += jump_velocity;\n  if (y >= jump_groundY) {\n    y = jump_groundY;\n    jump_velocity = 0;\n    jump_onGround = true;\n  }\n}\n\nfunction keyPressed() {\n  if (key === " " && jump_onGround) {\n    jump_velocity = jump_force_ui;\n    jump_onGround = false;\n  }\n}',
    draw:'jump_apply();' },
  { id:'bounce', cat:'physics', template:false,
    title:'Bounce',
    desc:'Stuitert tegen de randen',
    logic:'// --- LOGIC: bounce ---\n// Stuiteren: keer de snelheid (velocity) om bij de rand\nlet bounce_velocityX = 3;\nlet bounce_velocityY = 2;\n\nfunction bounce_update() {\n  x += bounce_velocityX;\n  y += bounce_velocityY;\n  if (x <= 15 || x >= 385) bounce_velocityX *= -1;\n  if (y <= 15 || y >= 385) bounce_velocityY *= -1;\n}',
    draw:'bounce_update();' },
  { id:'friction', cat:'physics', template:false,
    title:'Friction',
    desc:'Snelheid neemt af over tijd',
    logic:'// --- LOGIC: friction ---\n// Wrijving (friction): vermenigvuldig snelheid met een factor < 1\nlet friction_velocityX = 0;\nlet friction_velocityY = 0;\nlet friction_factor_ui = 0.95; // Wrijving (friction) min:0.8 max:0.999 step:0.005\nlet friction_push_ui = 2; // Duwkracht (push force) min:0.5 max:5 step:0.5\n\nfunction friction_update() {\n  if (keyIsDown(LEFT_ARROW)) friction_velocityX -= friction_push_ui;\n  if (keyIsDown(RIGHT_ARROW)) friction_velocityX += friction_push_ui;\n  if (keyIsDown(UP_ARROW)) friction_velocityY -= friction_push_ui;\n  if (keyIsDown(DOWN_ARROW)) friction_velocityY += friction_push_ui;\n  friction_velocityX *= friction_factor_ui;\n  friction_velocityY *= friction_factor_ui;\n  x += friction_velocityX;\n  y += friction_velocityY;\n}',
    draw:'friction_update();' },

  // --- OBJECTS ---
  { id:'spawntimer', cat:'objects', template:false,
    title:'Spawn on timer',
    desc:'Objecten verschijnen automatisch',
    logic:'// --- LOGIC: spawntimer ---\n// Maak (spawn) objecten op een tijdsinterval (timer)\nlet spawntimer_items = [];\nlet spawntimer_interval_ui = 30; // Interval (frames) min:5 max:120 step:5\n\nfunction spawntimer_update() {\n  if (frameCount % spawntimer_interval_ui === 0) {\n    spawntimer_items.push({\n      x: random(20, 380),\n      y: random(20, 380),\n      size: random(5, 15)\n    });\n  }\n}\nfunction spawntimer_draw() {\n  fill(0, 255, 65, 150);\n  noStroke();\n  for (let item of spawntimer_items) {\n    circle(item.x, item.y, item.size);\n  }\n}',
    draw:'spawntimer_update();\nspawntimer_draw();' },
  { id:'spawnclick', cat:'objects', template:false,
    title:'Spawn on click',
    desc:'Klik om een object te maken',
    logic:'// --- LOGIC: spawnclick ---\n// Maak (spawn) objecten waar je klikt\nlet spawnclick_items = [];\n\nfunction mousePressed() {\n  spawnclick_items.push({\n    x: mouseX,\n    y: mouseY,\n    size: random(10, 25),\n    red: random(100, 255),\n    green: random(100, 255),\n    blue: random(100, 255)\n  });\n}\nfunction spawnclick_draw() {\n  noStroke();\n  for (let item of spawnclick_items) {\n    fill(item.red, item.green, item.blue, 180);\n    circle(item.x, item.y, item.size);\n  }\n}',
    draw:'spawnclick_draw();' },
  { id:'randomspawn', cat:'objects', template:false,
    title:'Random spawn',
    desc:'Objecten verschijnen willekeurig',
    logic:'// --- LOGIC: randomspawn ---\n// Objecten op willekeurige (random) posities die langzaam verdwijnen\nlet randomspawn_items = [];\nlet randomspawn_max_ui = 20; // Maximum min:5 max:100 step:5\n\nfunction randomspawn_update() {\n  if (randomspawn_items.length < randomspawn_max_ui && random() < 0.05) {\n    randomspawn_items.push({\n      x: random(400),\n      y: random(400),\n      size: random(5, 20),\n      opacity: 255\n    });\n  }\n  for (let i = randomspawn_items.length - 1; i >= 0; i--) {\n    randomspawn_items[i].opacity -= 1;\n    if (randomspawn_items[i].opacity <= 0) {\n      randomspawn_items.splice(i, 1);\n    }\n  }\n}\nfunction randomspawn_draw() {\n  noStroke();\n  for (let item of randomspawn_items) {\n    fill(0, 255, 65, item.opacity);\n    circle(item.x, item.y, item.size);\n  }\n}',
    draw:'randomspawn_update();\nrandomspawn_draw();' },
  { id:'objectpool', cat:'objects', template:false,
    title:'Moving objects',
    desc:'Groep objecten die bewegen',
    logic:'// --- LOGIC: objectpool ---\n// Een verzameling (array) van bewegende objecten\nlet objectpool_items = [];\nlet objectpool_count_ui = 15; // Aantal (count) min:3 max:50\n\nfunction objectpool_init() {\n  objectpool_items = [];\n  for (let i = 0; i < objectpool_count_ui; i++) {\n    objectpool_items.push({\n      x: random(400),\n      y: random(400),\n      velocityX: random(-2, 2),\n      velocityY: random(-2, 2),\n      size: random(8, 20)\n    });\n  }\n}\nfunction objectpool_update() {\n  if (!objectpool_items.length) objectpool_init();\n  for (let item of objectpool_items) {\n    item.x += item.velocityX;\n    item.y += item.velocityY;\n    if (item.x < 0 || item.x > 400) item.velocityX *= -1;\n    if (item.y < 0 || item.y > 400) item.velocityY *= -1;\n  }\n}\nfunction objectpool_draw() {\n  noStroke();\n  fill(0, 255, 100, 150);\n  for (let item of objectpool_items) {\n    circle(item.x, item.y, item.size);\n  }\n}',
    draw:'objectpool_update();\nobjectpool_draw();' },

  // --- COLLISION ---
  { id:'collcircle', cat:'collision', template:false,
    title:'Circle vs circle',
    desc:'Botsing tussen twee cirkels',
    logic:'// --- LOGIC: collcircle ---\n// Botsingsdetectie (collision) tussen cirkels: vergelijk afstand (distance) met straal (radius)\nlet collcircle_targetX = 300;\nlet collcircle_targetY = 200;\nlet collcircle_size_ui = 40; // Grootte (size) min:10 max:80\n\nfunction collcircle_draw() {\n  let distance = dist(x, y, collcircle_targetX, collcircle_targetY);\n  let isHitting = distance < collcircle_size_ui;\n  if (isHitting) {\n    fill(255, 180, 0);\n  } else {\n    fill(0, 100, 255);\n  }\n  circle(collcircle_targetX, collcircle_targetY, collcircle_size_ui);\n}',
    draw:'collcircle_draw();' },
  { id:'collrect', cat:'collision', template:false,
    title:'Point vs rectangle',
    desc:'Is een punt in een rechthoek?',
    logic:'// --- LOGIC: collrect ---\n// Controleer of een punt (point) in een rechthoek (rectangle) valt\nlet collrect_rectX = 150;\nlet collrect_rectY = 150;\nlet collrect_rectWidth = 100;\nlet collrect_rectHeight = 100;\n\nfunction collrect_draw() {\n  let insideX = x > collrect_rectX && x < collrect_rectX + collrect_rectWidth;\n  let insideY = y > collrect_rectY && y < collrect_rectY + collrect_rectHeight;\n  let isInside = insideX && insideY;\n\n  if (isInside) {\n    stroke(255, 180, 0);\n    fill(255, 180, 0, 30);\n  } else {\n    stroke(0, 255, 65);\n    noFill();\n  }\n  rect(collrect_rectX, collrect_rectY, collrect_rectWidth, collrect_rectHeight);\n}',
    draw:'collrect_draw();' },
  { id:'collect', cat:'collision', template:false,
    title:'Collect',
    desc:'Raak objecten aan om te verzamelen',
    logic:'// --- LOGIC: collect ---\n// Verzamel (collect) objecten door ze aan te raken\nlet collect_items = [];\nlet collect_score = 0;\n\nfunction collect_init() {\n  collect_items = [];\n  collect_score = 0;\n  for (let i = 0; i < 10; i++) {\n    collect_items.push({ x: random(30, 370), y: random(30, 370) });\n  }\n}\nfunction collect_update() {\n  if (!collect_items.length) collect_init();\n  for (let i = collect_items.length - 1; i >= 0; i--) {\n    let distance = dist(x, y, collect_items[i].x, collect_items[i].y);\n    if (distance < 25) {\n      collect_items.splice(i, 1);\n      collect_score++;\n    }\n  }\n}\nfunction collect_draw() {\n  fill(255, 255, 0);\n  noStroke();\n  for (let item of collect_items) {\n    circle(item.x, item.y, 12);\n  }\n  fill(0, 255, 65);\n  textSize(16);\n  textAlign(LEFT, TOP);\n  text("Score: " + collect_score, 10, 10);\n}',
    draw:'collect_update();\ncollect_draw();' },

  // --- VISUALS ---
  { id:'particles', cat:'visuals', template:false,
    title:'Particle trail',
    desc:'Kleine deeltjes die vervagen',
    logic:'// --- LOGIC: particles ---\n// Deeltjes (particles) die vervagen (fade) achter het object\nlet particles_list = [];\nlet particles_rate_ui = 3; // Per frame min:1 max:10\n\nfunction particles_update() {\n  for (let i = 0; i < particles_rate_ui; i++) {\n    particles_list.push({\n      x: x + random(-5, 5),\n      y: y + random(-5, 5),\n      velocityX: random(-1, 1),\n      velocityY: random(-1, 1),\n      life: 60\n    });\n  }\n  for (let i = particles_list.length - 1; i >= 0; i--) {\n    let particle = particles_list[i];\n    particle.x += particle.velocityX;\n    particle.y += particle.velocityY;\n    particle.life--;\n    if (particle.life <= 0) particles_list.splice(i, 1);\n  }\n}\nfunction particles_draw() {\n  noStroke();\n  for (let particle of particles_list) {\n    fill(0, 255, 65, particle.life * 4);\n    circle(particle.x, particle.y, 4);\n  }\n}',
    draw:'particles_update();\nparticles_draw();' },
  { id:'aftertrails', cat:'visuals', template:false,
    title:'Aftertrails',
    desc:'Vervagende kopie\u00ebn achter je',
    logic:'// --- LOGIC: aftertrails ---\n// Naspoor: bewaar laatste posities en teken met afnemende dekking (opacity)\nlet aftertrails_hist = [];\nlet aftertrails_len_ui = 20; // Lengte (length) min:5 max:60\n\nfunction aftertrails_update() {\n  aftertrails_hist.push({x:x, y:y});\n  if (aftertrails_hist.length > aftertrails_len_ui) aftertrails_hist.shift();\n}\nfunction aftertrails_draw() {\n  noStroke();\n  for (let i=0; i<aftertrails_hist.length; i++) {\n    let a = map(i,0,aftertrails_hist.length,10,150);\n    let s = map(i,0,aftertrails_hist.length,10,28);\n    fill(0,255,65,a); circle(aftertrails_hist[i].x, aftertrails_hist[i].y, s);\n  }\n}',
    draw:'aftertrails_update();\naftertrails_draw();' },
  { id:'screenshake', cat:'visuals', template:false,
    title:'Screen shake',
    desc:'Scherm trilt bij klik',
    logic:'// --- LOGIC: screenshake ---\n// Schermtrillen (screen shake): verschuif alles willekeurig\nlet screenshake_amt = 0;\nlet screenshake_decay_ui = 0.9; // Afname (decay) min:0.8 max:0.99 step:0.01\n\nfunction screenshake_apply() {\n  if (screenshake_amt > 0.5) {\n    translate(random(-screenshake_amt,screenshake_amt), random(-screenshake_amt,screenshake_amt));\n    screenshake_amt *= screenshake_decay_ui;\n  }\n}\n\nfunction mousePressed() { screenshake_amt = 15; }',
    draw:'screenshake_apply();' },
  { id:'flash', cat:'visuals', template:false,
    title:'Flash / Blink',
    desc:'Object knippert',
    logic:'// --- LOGIC: flash ---\n// Knipperen (blink): wissel zichtbaarheid op basis van frametelling (frameCount)\nlet flash_rate_ui = 10; // Snelheid (rate) min:2 max:30\nlet flash_visible = true;\n\nfunction flash_update() {\n  flash_visible = (frameCount % flash_rate_ui) < (flash_rate_ui / 2);\n}',
    draw:'flash_update();' },
  { id:'sprite', cat:'visuals', template:false,
    title:'Sprite animation',
    desc:'Doorloop beelden voor animatie',
    logic:'// --- LOGIC: sprite ---\n// Sprite animatie: wissel tussen beelden (frames)\nlet sprite_frame = 0;\nlet sprite_speed_ui = 8; // Snelheid (speed) min:2 max:30\nlet sprite_nframes = 4;\n\nfunction sprite_draw_frame() {\n  let f = floor(sprite_frame) % sprite_nframes;\n  push(); translate(x, y); noStroke(); fill(0,255,65);\n  if (f===0) { circle(0,0,30); }\n  else if (f===1) { circle(0,-2,30); rect(-8,10,4,8); rect(4,10,4,8); }\n  else if (f===2) { circle(0,0,30); rect(-10,10,4,6); rect(6,10,4,6); }\n  else { circle(0,2,30); rect(-6,10,4,8); rect(2,10,4,8); }\n  pop();\n  sprite_frame += 60 / sprite_speed_ui * 0.016;\n}',
    draw:'sprite_draw_frame();' },
  { id:'gpuparticles', cat:'visuals', template:false,
    title:'GPU Particles',
    desc:'Duizenden deeltjes via de GPU',
    logic:'// --- LOGIC: gpuparticles ---\n// GPU deeltjes: de grafische kaart (GPU) kan duizenden vormen tegelijk tekenen\nlet gpuparticles_canvas;\nlet gpuparticles_count_ui = 2000; // Aantal (count) min:100 max:5000 step:100\n\nfunction gpuparticles_draw_fx() {\n  if (!gpuparticles_canvas) gpuparticles_canvas = createGraphics(400, 400, WEBGL);\n  gpuparticles_canvas.clear();\n  gpuparticles_canvas.noStroke();\n  let time = frameCount * 0.02;\n  for (let i = 0; i < gpuparticles_count_ui; i++) {\n    let angle = i * 0.1 + time;\n    let radius = 50 + sin(i * 0.05 + time) * 100;\n    let particleX = cos(angle) * radius;\n    let particleY = sin(angle * 0.7) * radius;\n    let brightness = 100 + sin(i + time) * 80;\n    gpuparticles_canvas.fill(0, 255, 65, brightness);\n    gpuparticles_canvas.circle(particleX, particleY, 3);\n  }\n  image(gpuparticles_canvas, 0, 0);\n}',
    draw:'gpuparticles_draw_fx();' },
  { id:'gpurects', cat:'visuals', template:false,
    title:'GPU Rectangle flood',
    desc:'Honderden draaiende rechthoeken',
    logic:'// --- LOGIC: gpurects ---\n// GPU rechthoeken: WEBGL modus maakt honderden vormen snel\nlet gpurects_canvas;\nlet gpurects_count_ui = 300; // Aantal (count) min:50 max:800 step:50\n\nfunction gpurects_draw_fx() {\n  if (!gpurects_canvas) gpurects_canvas = createGraphics(400, 400, WEBGL);\n  gpurects_canvas.clear();\n  gpurects_canvas.noFill();\n  gpurects_canvas.strokeWeight(1);\n  let time = frameCount * 0.01;\n  for (let i = 0; i < gpurects_count_ui; i++) {\n    gpurects_canvas.push();\n    let angle = i * 0.3 + time;\n    let radius = 30 + (i % 100) * 1.5;\n    gpurects_canvas.translate(cos(angle) * radius, sin(angle) * radius, 0);\n    gpurects_canvas.rotateZ(angle + time);\n    let size = 5 + sin(i * 0.1 + time * 2) * 10;\n    let brightness = 80 + sin(i + time) * 60;\n    gpurects_canvas.stroke(0, 255, 65, brightness);\n    gpurects_canvas.rect(-size / 2, -size / 2, size, size);\n    gpurects_canvas.pop();\n  }\n  image(gpurects_canvas, 0, 0);\n}',
    draw:'gpurects_draw_fx();' },
  { id:'gpushader', cat:'visuals', template:false,
    title:'GPU Shader filter',
    desc:'Kleur-effect via de GPU',
    logic:'// --- LOGIC: gpushader ---\n// GPU shader: een programma dat op de grafische kaart draait\nlet gpushader_canvas;\nlet gpushader_shader;\nlet gpushader_intensity_ui = 0.5; // Intensiteit (intensity) min:0 max:1 step:0.05\n\nfunction gpushader_apply() {\n  if (!gpushader_canvas) {\n    gpushader_canvas = createGraphics(400, 400, WEBGL);\n    gpushader_shader = gpushader_canvas.createFilterShader(`\n      precision mediump float;\n      varying vec2 vTexCoord;\n      uniform sampler2D tex0;\n      uniform float u_time;\n      uniform float u_int;\n      void main() {\n        vec2 uv = vTexCoord;\n        vec4 color = texture2D(tex0, uv);\n        float wave = sin(uv.y * 30.0 + u_time * 3.0) * u_int * 0.1;\n        color.r += wave;\n        color.g += wave * 0.5;\n        gl_FragColor = color;\n      }\n    `);\n  }\n  gpushader_canvas.image(get(), -200, -200, 400, 400);\n  gpushader_shader.setUniform("u_time", millis() / 1000.0);\n  gpushader_shader.setUniform("u_int", gpushader_intensity_ui);\n  gpushader_canvas.filter(gpushader_shader);\n  image(gpushader_canvas, 0, 0);\n}',
    draw:'gpushader_apply();' },

  // --- INPUT ---
  { id:'webcam', cat:'input', template:false,
    title:'Webcam',
    desc:'Webcam als achtergrond',
    logic:'// --- LOGIC: webcam ---\n// Webcam: gebruik het camerabeeld (video capture)\nlet webcam_cap, webcam_ok = false;\n\nfunction webcam_init() {\n  if (!webcam_cap) {\n    try {\n      webcam_cap = createCapture(VIDEO, function() { webcam_ok = true; });\n      webcam_cap.size(400,400); webcam_cap.hide();\n    } catch(e) { console.log("Webcam niet beschikbaar"); }\n  }\n}\nfunction webcam_draw_bg() {\n  webcam_init();\n  if (webcam_ok && webcam_cap) image(webcam_cap, 0, 0, 400, 400);\n}',
    draw:'webcam_draw_bg();' },

  // --- GAME TEMPLATES ---
  { id:'flappy', cat:'templates', template:true,
    title:'Flappy Bird',
    desc:'Vlieg door de openingen!',
    code:'// FLAPPY BIRD\n// Tik spatie of klik om te vliegen (flap)\n\n// === LOGIC ===\n\n// De vogel (bird) heeft een y-positie en snelheid (velocity)\nlet birdY = 200;\nlet birdVelocity = 0;\nlet birdX = 50;\nlet birdSize = 24;\n\n// Instellingen (settings) — pas aan met de sliders!\nlet flappy_gravity_ui = 0.4; // Zwaartekracht (gravity) min:0.1 max:1 step:0.05\nlet flappy_flapForce_ui = -6; // Flapkracht (flap force) min:-12 max:-2 step:0.5\nlet flappy_pipeSpeed_ui = 3; // Buissnelheid (pipe speed) min:1 max:6 step:0.5\nlet flappy_gapSize_ui = 120; // Opening (gap size) min:60 max:200 step:10\n\n// Buizen (pipes) is een lijst (array) van objecten\n// Elk object heeft: x, gapTop, scored\nlet pipes = [];\nlet score = 0;\nlet gameOver = false;\nlet pipeWidth = 40;\n\n// Maak een nieuwe buis (pipe) aan de rechterkant\nfunction addPipe() {\n  let gapTop = random(80, 300 - flappy_gapSize_ui);\n  pipes.push({\n    x: 420,\n    gapTop: gapTop,\n    scored: false\n  });\n}\n\n// Zet alles terug naar het begin (reset)\nfunction resetGame() {\n  birdY = 200;\n  birdVelocity = 0;\n  pipes = [];\n  score = 0;\n  gameOver = false;\n  addPipe();\n}\n\n// Laat de vogel flappen (jump)\nfunction flap() {\n  if (gameOver) {\n    resetGame();\n    return;\n  }\n  birdVelocity = flappy_flapForce_ui;\n}\n\n// === SETUP ===\nfunction setup() {\n  createCanvas(400, 400);\n  addPipe();\n}\n\n// === DRAW ===\nfunction draw() {\n  background(0);\n\n  // Game over scherm\n  if (gameOver) {\n    fill(255, 0, 0);\n    textSize(40);\n    textAlign(CENTER, CENTER);\n    text("GAME OVER", 200, 170);\n    fill(0, 255, 65);\n    textSize(16);\n    text("Score: " + score, 200, 210);\n    text("Klik om opnieuw te spelen", 200, 240);\n    return;\n  }\n\n  // Zwaartekracht (gravity): snelheid neemt steeds toe\n  birdVelocity += flappy_gravity_ui;\n  birdY += birdVelocity;\n\n  // Voeg elke 90 frames een nieuwe buis toe\n  if (frameCount % 90 === 0) {\n    addPipe();\n  }\n\n  // Loop door alle buizen (pipes)\n  for (let i = pipes.length - 1; i >= 0; i--) {\n    let pipe = pipes[i];\n\n    // Beweeg de buis naar links\n    pipe.x -= flappy_pipeSpeed_ui;\n\n    // Teken de buis: boven en onder de opening (gap)\n    fill(0, 180, 0);\n    noStroke();\n    rect(pipe.x, 0, pipeWidth, pipe.gapTop);\n    let gapBottom = pipe.gapTop + flappy_gapSize_ui;\n    rect(pipe.x, gapBottom, pipeWidth, 400);\n\n    // Score: tel punt als vogel voorbij de buis is\n    if (!pipe.scored && pipe.x + pipeWidth < birdX) {\n      score++;\n      pipe.scored = true;\n    }\n\n    // Botsing (collision): vogel raakt de buis\n    let birdInPipeX = birdX > pipe.x && birdX < pipe.x + pipeWidth;\n    let birdAboveGap = birdY < pipe.gapTop + 10;\n    let birdBelowGap = birdY > gapBottom - 10;\n    if (birdInPipeX && (birdAboveGap || birdBelowGap)) {\n      gameOver = true;\n    }\n\n    // Verwijder buizen die van het scherm zijn\n    if (pipe.x < -50) {\n      pipes.splice(i, 1);\n    }\n  }\n\n  // Vogel raakt de rand (boundary) van het scherm\n  if (birdY > 395 || birdY < 5) {\n    gameOver = true;\n  }\n\n  // Teken de vogel (bird)\n  fill(255, 255, 0);\n  noStroke();\n  circle(birdX, birdY, birdSize);\n\n  // Teken de score\n  fill(0, 255, 65);\n  textSize(20);\n  textAlign(LEFT, TOP);\n  text("SCORE: " + score, 10, 10);\n}\n\nfunction keyPressed() {\n  if (key === " ") {\n    flap();\n  }\n}\n\nfunction mousePressed() {\n  flap();\n}' },

  { id:'platformer', cat:'templates', template:true,
    title:'Platformer',
    desc:'Spring op platformen!',
    code:'// PLATFORMER\n// Pijltjes om te bewegen, spatie om te springen\n\n// === LOGIC ===\n\n// De speler (player) heeft een positie en snelheid (velocity)\nlet playerX = 50;\nlet playerY = 300;\nlet playerVelocityX = 0;\nlet playerVelocityY = 0;\nlet playerOnGround = false;\nlet playerWidth = 20;\nlet playerHeight = 30;\n\n// Instellingen (settings)\nlet plat_runSpeed_ui = 4; // Loopsnelheid (run speed) min:1 max:8\nlet plat_jumpForce_ui = -10; // Springkracht (jump force) min:-15 max:-4 step:0.5\nlet plat_gravity_ui = 0.5; // Zwaartekracht (gravity) min:0.1 max:1 step:0.05\n\n// Platformen (platforms): een lijst van rechthoeken\nlet platforms = [\n  { x: 0,   y: 380, width: 400, height: 20 },\n  { x: 50,  y: 300, width: 80,  height: 12 },\n  { x: 180, y: 250, width: 80,  height: 12 },\n  { x: 300, y: 200, width: 80,  height: 12 },\n  { x: 150, y: 150, width: 80,  height: 12 },\n  { x: 20,  y: 100, width: 80,  height: 12 },\n  { x: 250, y: 320, width: 80,  height: 12 }\n];\n\n// Munten (coins): verzamel ze allemaal!\nlet coins = [\n  { x: 90,  y: 280, collected: false },\n  { x: 220, y: 230, collected: false },\n  { x: 340, y: 180, collected: false },\n  { x: 190, y: 130, collected: false },\n  { x: 60,  y: 80,  collected: false }\n];\nlet coinScore = 0;\n\n// === SETUP ===\nfunction setup() {\n  createCanvas(400, 400);\n}\n\n// === DRAW ===\nfunction draw() {\n  background(10, 10, 30);\n\n  // Besturing (controls): links en rechts\n  playerVelocityX = 0;\n  if (keyIsDown(LEFT_ARROW)) playerVelocityX = -plat_runSpeed_ui;\n  if (keyIsDown(RIGHT_ARROW)) playerVelocityX = plat_runSpeed_ui;\n\n  // Zwaartekracht (gravity)\n  playerVelocityY += plat_gravity_ui;\n\n  // Beweeg de speler\n  playerX += playerVelocityX;\n  playerY += playerVelocityY;\n\n  // Botsing (collision) met platformen\n  playerOnGround = false;\n  for (let platform of platforms) {\n    let playerLeft = playerX - playerWidth / 2;\n    let playerRight = playerX + playerWidth / 2;\n    let playerBottom = playerY + playerHeight / 2;\n\n    let onPlatformX = playerRight > platform.x && playerLeft < platform.x + platform.width;\n    let hittingTop = playerBottom > platform.y && playerBottom < platform.y + platform.height + 10;\n    let fallingDown = playerVelocityY >= 0;\n\n    if (onPlatformX && hittingTop && fallingDown) {\n      playerY = platform.y - playerHeight / 2;\n      playerVelocityY = 0;\n      playerOnGround = true;\n    }\n  }\n\n  // Houd speler op het scherm\n  playerX = constrain(playerX, 10, 390);\n\n  // Teken platformen\n  fill(0, 200, 100);\n  noStroke();\n  for (let platform of platforms) {\n    rect(platform.x, platform.y, platform.width, platform.height);\n  }\n\n  // Teken en verzamel munten (coins)\n  fill(255, 255, 0);\n  for (let coin of coins) {\n    if (!coin.collected) {\n      circle(coin.x, coin.y, 14);\n      // Botsing: speler raakt munt\n      if (dist(playerX, playerY, coin.x, coin.y) < 20) {\n        coin.collected = true;\n        coinScore++;\n      }\n    }\n  }\n\n  // Teken de speler\n  fill(0, 255, 65);\n  rect(playerX - playerWidth / 2, playerY - playerHeight / 2, playerWidth, playerHeight);\n\n  // Teken de score\n  textSize(18);\n  textAlign(LEFT, TOP);\n  text("COINS: " + coinScore + "/" + coins.length, 10, 10);\n}\n\nfunction keyPressed() {\n  if (key === " " && playerOnGround) {\n    playerVelocityY = plat_jumpForce_ui;\n  }\n}' },

  { id:'micromachines', cat:'templates', template:true,
    title:'Micromachines',
    desc:'Top-down racen!',
    code:'// MICROMACHINES\n// Draai met links/rechts, gas met omhoog\n\n// === LOGIC ===\n\n// De auto (car) heeft een positie, richting (angle) en snelheid (speed)\nlet carX = 200;\nlet carY = 300;\nlet carAngle = -PI / 2;\nlet carSpeed = 0;\n\n// Ronden (laps) tellen\nlet lapCount = 0;\nlet passedCheckpoint = false;\n\n// Instellingen (settings)\nlet mm_maxSpeed_ui = 4; // Max snelheid (speed) min:1 max:8\nlet mm_acceleration_ui = 0.1; // Versnelling (acceleration) min:0.02 max:0.3 step:0.02\nlet mm_turnSpeed_ui = 0.04; // Draaisnelheid (turn speed) min:0.01 max:0.1 step:0.005\nlet mm_friction_ui = 0.97; // Wrijving (friction) min:0.9 max:0.999 step:0.005\n\n// Baanpunten (track points): de bocht (curve) van het circuit\nlet trackPoints = [\n  { x: 200, y: 80 },\n  { x: 340, y: 120 },\n  { x: 360, y: 250 },\n  { x: 300, y: 350 },\n  { x: 200, y: 370 },\n  { x: 100, y: 350 },\n  { x: 40,  y: 250 },\n  { x: 60,  y: 120 }\n];\n\n// === SETUP ===\nfunction setup() {\n  createCanvas(400, 400);\n}\n\n// === DRAW ===\nfunction draw() {\n  background(40, 80, 40);\n\n  // Teken de baan (track) als een vloeiende lijn (curve)\n  stroke(80);\n  strokeWeight(50);\n  noFill();\n  beginShape();\n  for (let point of trackPoints) {\n    curveVertex(point.x, point.y);\n  }\n  // Herhaal de eerste punten om de curve te sluiten\n  for (let i = 0; i < 3; i++) {\n    curveVertex(trackPoints[i].x, trackPoints[i].y);\n  }\n  endShape();\n\n  // Start/finish lijn\n  stroke(255);\n  strokeWeight(3);\n  line(190, 60, 210, 60);\n\n  // Besturing (controls)\n  if (keyIsDown(LEFT_ARROW)) carAngle -= mm_turnSpeed_ui;\n  if (keyIsDown(RIGHT_ARROW)) carAngle += mm_turnSpeed_ui;\n  if (keyIsDown(UP_ARROW)) carSpeed = min(carSpeed + mm_acceleration_ui, mm_maxSpeed_ui);\n  if (keyIsDown(DOWN_ARROW)) carSpeed = max(carSpeed - mm_acceleration_ui * 2, -mm_maxSpeed_ui / 2);\n\n  // Wrijving (friction) vertraagt de auto\n  carSpeed *= mm_friction_ui;\n\n  // Beweeg in de richting (angle) van de auto\n  carX += cos(carAngle) * carSpeed;\n  carY += sin(carAngle) * carSpeed;\n\n  // Wrap rond het scherm (screen wrapping)\n  if (carX < 0) carX = 400;\n  if (carX > 400) carX = 0;\n  if (carY < 0) carY = 400;\n  if (carY > 400) carY = 0;\n\n  // Ronden tellen: checkpoint (onderaan) en finish (bovenaan)\n  if (carY > 300 && !passedCheckpoint) passedCheckpoint = true;\n  if (carY < 100 && passedCheckpoint) {\n    lapCount++;\n    passedCheckpoint = false;\n  }\n\n  // Teken de auto (car) met push/pop en rotate\n  push();\n  translate(carX, carY);\n  rotate(carAngle);\n  fill(255, 0, 0);\n  noStroke();\n  rect(-12, -6, 24, 12, 3);\n  fill(255, 200, 0);\n  rect(8, -4, 4, 8);\n  pop();\n\n  // Teken rondeteller (lap counter)\n  fill(0, 255, 65);\n  noStroke();\n  textSize(18);\n  textAlign(LEFT, TOP);\n  text("LAPS: " + lapCount, 10, 10);\n}' },

  { id:'spaceinvaders', cat:'templates', template:true,
    title:'Space Invaders',
    desc:'Schiet de aliens neer!',

// ============================================================
// STATE
// ============================================================
var editor, currentSketch = null;
var undoStack = [], redoStack = [];
var lastSnapshot = '';
var uiValues = {};
var runTimeout = null;
var lineHighlight = null;
var confirmCallback = null;

// Tab state
var tabs = [];
var activeTabId = 0;
var nextTabId = 1;
var timerStart = Date.now();

// ============================================================
// LOOP PROTECTION
// ============================================================
function instrumentLoops(code) {
  var id = 0;
  var out = code.replace(/((?:while|for)\s*\([^)]*?\))\s*\{/g, function(m, head) {
    id++;
    return head + '{if(++__lc' + id + '>1e5)throw new Error("' + t('infiniteLoop') + '");';
  });
  var decls = '';
  for (var i = 1; i <= id; i++) decls += 'var __lc' + i + '=0;';
  return decls + out;
}

// ============================================================
// _UI PROCESSING
// ============================================================
function processUI(code) {
  var vars = [];
  var processed = code.replace(
    /^(let|const|var)\s+(\w+_ui)\s*=\s*(.+?)\s*;(.*)$/gm,
    function(m, decl, name, value, rest) {
      vars.push({ name: name, defaultValue: value.trim(), comment: rest.trim().replace(/^\/\/\s*/, '') });
      return ''; // preserve line count
    }
  );
  return { code: processed, uiVars: vars };
}

// ============================================================
// SKETCH EXECUTION
// ============================================================
window.__wLog = function(msg) { logToConsole(msg, 'log'); };
window.__wErr = function(msg, err) { logToConsole(msg, 'error', err); };

function runSketch() {
  var rawCode = editor.getValue();
  var container = document.getElementById('canvas-container');
  // Save active tab's code
  var activeTab = tabs.find(function(t) { return t.id === activeTabId; });
  if (activeTab) activeTab.code = rawCode;
  localStorage.setItem('workshop_code', rawCode);
  pushSnapshot();

  if (currentSketch) { currentSketch.remove(); currentSketch = null; }
  container.innerHTML = '';

  var result = processUI(rawCode);
  var safe = instrumentLoops(result.code);
  var uiVars = result.uiVars;
  var headerLines = 2 + uiVars.length;

  try {
    var body = 'with(p) {\n';
    body += 'var console={log:function(){window.__wLog(Array.from(arguments).map(String).join(" "))},error:function(){window.__wErr(Array.from(arguments).map(String).join(" "))},warn:function(){window.__wLog("[WARN] "+Array.from(arguments).map(String).join(" "))}};\n';
    for (var i = 0; i < uiVars.length; i++) {
      var v = uiVars[i];
      var saved = uiValues[v.name];
      body += 'p["' + v.name + '"]=' + (saved !== undefined ? JSON.stringify(saved) : v.defaultValue) + ';\n';
    }
    body += 'try{\n' + safe + '\n}catch(e){window.__wErr(e.message,e);return;}\n';
    body += 'if(typeof setup==="function")p.setup=setup;\n';
    body += 'if(typeof draw==="function"){var __d=draw;p.draw=function(){try{__d();}catch(e){window.__wErr(e.message,e);p.noLoop();}};}\n';
    body += 'if(typeof mousePressed==="function")p.mousePressed=mousePressed;\n';
    body += 'if(typeof mouseReleased==="function")p.mouseReleased=mouseReleased;\n';
    body += 'if(typeof keyPressed==="function")p.keyPressed=keyPressed;\n';
    body += 'if(typeof keyReleased==="function")p.keyReleased=keyReleased;\n';
    body += '}\n';

    var fn = new Function('p', body);
    currentSketch = new p5(function(p) { fn(p); }, container);
    currentSketch.__lineOffset = headerLines;
    buildTweaks(uiVars);
  } catch(e) {
    logToConsole(e.message, 'error', e);
  }
}

function manualRun() { clearTimeout(runTimeout); runSketch(); }
function scheduleRun() { clearTimeout(runTimeout); runTimeout = setTimeout(runSketch, 1000); }

// ============================================================
// CONSOLE
// ============================================================
function logToConsole(msg, type, err) {
  var con = document.getElementById('console-container');
  var div = document.createElement('div');
  div.className = 'console-line ' + type;

  if (type === 'error') {
    var line = null, col = 0;
    if (err && err.stack) {
      var sm = err.stack.match(/<anonymous>:(\d+):(\d+)/);
      if (sm) {
        var offset = (currentSketch && currentSketch.__lineOffset) || 0;
        line = parseInt(sm[1]) - offset;
        col = parseInt(sm[2]);
      }
    }
    if (line && line > 0) {
      var prefix = '> ' + t('errorPrefix') + ' ';
      var link = document.createElement('a');
      link.textContent = '[ln ' + line + ', col ' + col + ']';
      link.onclick = function() { jumpToLine(line - 1, col - 1); };
      div.textContent = prefix;
      div.appendChild(link);
      div.appendChild(document.createTextNode(': ' + msg));
    } else {
      div.textContent = '> ' + t('errorPrefix') + ': ' + msg;
    }
  } else {
    div.textContent = '> ' + msg;
  }
  con.appendChild(div);
  con.scrollTop = con.scrollHeight;
}

function clearConsole() { document.getElementById('console-container').innerHTML = ''; }

function jumpToLine(line, col) {
  editor.setCursor(line, col || 0);
  editor.focus();
  if (lineHighlight !== null) editor.removeLineClass(lineHighlight, 'background', 'line-highlight');
  lineHighlight = line;
  editor.addLineClass(line, 'background', 'line-highlight');
  setTimeout(function() { editor.removeLineClass(line, 'background', 'line-highlight'); }, 1500);
}

// ============================================================
// SNIPPET INSERTION
// ============================================================
function insertSnippet(logic, draw) {
  var code = editor.getValue();

  // Don't add if the snippet logic is already present
  var firstLine = logic.split('\n')[0];
  if (code.indexOf(firstLine) !== -1) {
    logToConsole('Snippet already added', 'log');
    return;
  }

  var marker = '// === SETUP ===';
  var idx = code.indexOf(marker);
  if (idx !== -1) {
    code = code.slice(0, idx) + logic + '\n\n' + code.slice(idx);
  } else {
    code = logic + '\n\n' + code;
  }
  var last = code.lastIndexOf('}');
  if (last !== -1) {
    code = code.slice(0, last) + '  ' + draw + '\n' + code.slice(last);
  }
  editor.setValue(code);
  scheduleRun();
}

function replaceWithTemplate(code) {
  showConfirm(t('confirmTemplate'), function(yes) {
    if (yes) { pushSnapshot(); editor.setValue(code); scheduleRun(); }
  });
}

// ============================================================
// UNDO / REDO
// ============================================================
function pushSnapshot() {
  var cur = editor.getValue();
  if (cur !== lastSnapshot) {
    undoStack.push(lastSnapshot);
    redoStack.length = 0;
    lastSnapshot = cur;
    if (undoStack.length > 100) undoStack.shift();
  }
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(editor.getValue());
  var prev = undoStack.pop();
  lastSnapshot = prev;
  editor.setValue(prev);
  scheduleRun();
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push(editor.getValue());
  var next = redoStack.pop();
  lastSnapshot = next;
  editor.setValue(next);
  scheduleRun();
}

// ============================================================
// PERSISTENCE
// ============================================================
function downloadHTML() {
  var code = editor.getValue();
  var html = '<!DOCTYPE html>\n<html>\n<head>\n<meta charset="utf-8">\n<title>My Game</title>\n';
  html += '<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"><\/script>\n';
  html += '<style>body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;}</style>\n';
  html += '</head>\n<body>\n<script>\n' + code + '\n<\/script>\n</body>\n</html>';
  var blob = new Blob([html], { type: 'text/html' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'my-game.html'; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// TWEAKS PANEL
// ============================================================
// NOTE: innerHTML usage below is safe — all content is generated from internal snippet
// data (not user input). This is a local-only workshop tool with no server communication.
function buildTweaks(vars) {
  var content = document.getElementById('tweaks-content');
  content.innerHTML = '';

  for (var i = 0; i < vars.length; i++) {
    var v = vars[i];
    var row = document.createElement('div');
    row.className = 'tweak-row';
    var lbl = document.createElement('label');
    lbl.textContent = v.name;
    row.appendChild(lbl);

    var val = v.defaultValue.trim();
    var minV=0, maxV=10, stepV=0.1;
    var rm = v.comment.match(/min:([\d.-]+)/); if(rm) minV=parseFloat(rm[1]);
    rm = v.comment.match(/max:([\d.-]+)/); if(rm) maxV=parseFloat(rm[1]);
    rm = v.comment.match(/step:([\d.-]+)/); if(rm) stepV=parseFloat(rm[1]);

    if (val.match(/^-?[\d.]+$/) && !isNaN(parseFloat(val))) {
      var numV = uiValues[v.name] !== undefined ? uiValues[v.name] : parseFloat(val);
      if (uiValues[v.name] === undefined) uiValues[v.name] = numV;
      var sl = document.createElement('input');
      sl.type='range'; sl.min=minV; sl.max=maxV; sl.step=stepV; sl.value=numV;
      var pct = ((numV - minV) / (maxV - minV)) * 100;
      sl.style.setProperty('--val-pct', pct + '%');
      var disp = document.createElement('span');
      disp.className='val-display'; disp.textContent=numV;
      (function(name,s,d,mn,mx){
        s.oninput=function(){var v=parseFloat(s.value);uiValues[name]=v;d.textContent=v;
          s.style.setProperty('--val-pct',((v-mn)/(mx-mn))*100+'%');
          if(currentSketch)currentSketch[name]=v;};
      })(v.name,sl,disp,minV,maxV);
      row.appendChild(sl); row.appendChild(disp);
    } else if (val.match(/^['"]#[0-9a-fA-F]{3,8}['"]$/)) {
      var colV = uiValues[v.name] !== undefined ? uiValues[v.name] : val.replace(/['"]/g,'');
      if (uiValues[v.name]===undefined) uiValues[v.name]=colV;
      var ci = document.createElement('input'); ci.type='color'; ci.value=colV;
      (function(name,c){c.oninput=function(){uiValues[name]=c.value;if(currentSketch)currentSketch[name]=c.value;};})(v.name,ci);
      row.appendChild(ci);
    } else if (val==='true'||val==='false') {
      var bV = uiValues[v.name]!==undefined?uiValues[v.name]:(val==='true');
      if(uiValues[v.name]===undefined) uiValues[v.name]=bV;
      var tog=document.createElement('div'); tog.className='toggle-switch'+(bV?' on':'');
      (function(name,t){t.onclick=function(){var n=!uiValues[name];uiValues[name]=n;t.classList.toggle('on',n);if(currentSketch)currentSketch[name]=n;};})(v.name,tog);
      row.appendChild(tog);
    } else if (val.match(/^['"].*['"]$/)) {
      var sV=uiValues[v.name]!==undefined?uiValues[v.name]:val.replace(/^['"]|['"]$/g,'');
      if(uiValues[v.name]===undefined) uiValues[v.name]=sV;
      var ti=document.createElement('input'); ti.type='text'; ti.value=sV;
      (function(name,inp){inp.oninput=function(){uiValues[name]=inp.value;if(currentSketch)currentSketch[name]=inp.value;};})(v.name,ti);
      row.appendChild(ti);
    }
    content.appendChild(row);
  }
}


// ============================================================
// CONFIRM DIALOG
// ============================================================
function showConfirm(msg, cb) {
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-overlay').classList.add('show');
  confirmCallback=cb;
}
function confirmResolve(result) {
  document.getElementById('confirm-overlay').classList.remove('show');
  if(confirmCallback) confirmCallback(result);
  confirmCallback=null;
}
function confirmReset() {
  showConfirm(t('confirmReset'), function(yes) {
    if(yes){
      editor.setValue(STARTER_CODE);
      lastSnapshot=STARTER_CODE;
      undoStack.length=0; redoStack.length=0;
      Object.keys(uiValues).forEach(function(k){delete uiValues[k];});
      runSketch();
    }
  });
}

// ============================================================
// TABS
// ============================================================
function createTab(name, code) {
  var tab = { id: nextTabId++, name: name, code: code };
  tabs.push(tab);
  switchTab(tab.id);
  return tab;
}

function switchTab(id) {
  // Save current editor content to current tab
  if (editor && tabs.length > 0) {
    var cur = tabs.find(function(t) { return t.id === activeTabId; });
    if (cur) cur.code = editor.getValue();
  }
  activeTabId = id;
  var tab = tabs.find(function(t) { return t.id === id; });
  if (tab && editor) {
    // Temporarily remove change listener to prevent double-run
    editor.off('change', scheduleRun);
    editor.setValue(tab.code);
    editor.on('change', scheduleRun);
    lastSnapshot = tab.code;
    undoStack.length = 0;
    redoStack.length = 0;
    Object.keys(uiValues).forEach(function(k) { delete uiValues[k]; });
    clearTimeout(runTimeout);
    runSketch();
  }
  renderTabs();
}

function closeTab(id) {
  if (tabs.length <= 1) return; // keep at least one tab
  var idx = tabs.findIndex(function(t) { return t.id === id; });
  if (idx === -1) return;
  tabs.splice(idx, 1);
  if (activeTabId === id) {
    // Switch to nearest tab
    var newIdx = Math.min(idx, tabs.length - 1);
    switchTab(tabs[newIdx].id);
  } else {
    renderTabs();
  }
}

function renderTabs() {
  var bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  for (var i = 0; i < tabs.length; i++) {
    var tab = tabs[i];
    var el = document.createElement('button');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    var label = document.createElement('span');
    label.textContent = tab.name;
    el.appendChild(label);
    if (tabs.length > 1) {
      var close = document.createElement('span');
      close.className = 'tab-close';
      close.textContent = '\u00d7';
      (function(tid) { close.onclick = function(e) { e.stopPropagation(); closeTab(tid); }; })(tab.id);
      el.appendChild(close);
    }
    (function(tid) { el.onclick = function() { switchTab(tid); }; })(tab.id);
    bar.appendChild(el);
  }
}

// ============================================================
// TIMER
// ============================================================
function updateTimer() {
  var elapsed = Date.now() - timerStart;
  var mins = Math.floor(elapsed / 60000);
  var secs = Math.floor((elapsed % 60000) / 1000);
  var cs = Math.floor((elapsed % 1000) / 10);
  var display = (mins < 10 ? '0' : '') + mins + ':' +
                (secs < 10 ? '0' : '') + secs + '.' +
                (cs < 10 ? '0' : '') + cs;
  var el = document.getElementById('timer-value');
  if (el) el.textContent = display;
  requestAnimationFrame(updateTimer);
}

      card.className='snippet-card';
      var ti=document.createElement('div'); ti.className='title';
      ti.textContent=sn.title;
      var de=document.createElement('div'); de.className='desc';
      de.textContent=sn.desc;
      var acts=document.createElement('div'); acts.className='card-actions';
      var cb=document.createElement('button'); cb.className='btn';
      cb.textContent=t('copy'); cb.style.fontSize='13px'; cb.style.padding='2px 8px';
      (function(snippet){cb.onclick=function(e){e.stopPropagation();
        if(snippet.template) replaceWithTemplate(snippet.code);
        else insertSnippet(snippet.logic,snippet.draw);
      };})(sn);
      var vb=document.createElement('button'); vb.className='btn';
      vb.textContent=t('viewCode'); vb.style.fontSize='13px'; vb.style.padding='2px 8px';
      (function(snippet){vb.onclick=function(e){e.stopPropagation();
        var code = STARTER_CODE;
        if (snippet.template) {
          code = snippet.code;
        } else {
          // Insert snippet into fresh skeleton
          var marker = '// === SETUP ===';
          var idx = code.indexOf(marker);
          if (idx !== -1) { code = code.slice(0, idx) + snippet.logic + '\n\n' + code.slice(idx); }
          else { code = snippet.logic + '\n\n' + code; }
          var last = code.lastIndexOf('}');
          if (last !== -1) { code = code.slice(0, last) + '  ' + snippet.draw + '\n' + code.slice(last); }
        }
        createTab(snippet.title, code);
      };})(sn);
      acts.appendChild(cb); acts.appendChild(vb);
      var cp=document.createElement('div'); cp.className='code-preview';
      cp.textContent=sn.template?sn.code:(sn.logic+'\n\n'+sn.draw);
      card.appendChild(ti); card.appendChild(de); card.appendChild(acts); card.appendChild(cp);
      gallery.appendChild(card);
    }
  }
}

// INIT
// ============================================================
// ============================================================
// RESIZABLE PANELS
// ============================================================
function initResize() {
  var handle1 = document.getElementById('resize-1');
  var handle2 = document.getElementById('resize-2');
  var gallery = document.getElementById('gallery');
  var canvasPanel = document.getElementById('canvas-panel');

  function makeDraggable(handle, getTarget, side) {
    var startX, startW;
    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      startX = e.clientX;
      startW = getTarget().getBoundingClientRect().width;
      handle.classList.add('active');
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    function onMove(e) {
      var diff = e.clientX - startX;
      var newW = side === 'left' ? startW + diff : startW - diff;
      getTarget().style.width = Math.max(150, newW) + 'px';
      if (editor) editor.refresh();
    }
    function onUp() {
      handle.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
  }

  makeDraggable(handle1, function() { return gallery; }, 'left');
  makeDraggable(handle2, function() { return canvasPanel; }, 'right');
}

function init() {
  editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
    mode:'javascript', lineNumbers:true, matchBrackets:true,
    autoCloseBrackets:true, styleActiveLine:true,
    indentUnit:2, tabSize:2, indentWithTabs:false
  });
  var saved = localStorage.getItem('workshop_code');
  var code = saved || STARTER_CODE;
  // Create initial tab
  tabs.push({ id: 0, name: 'main', code: code });
  activeTabId = 0;
  editor.setValue(code);
  lastSnapshot = code;
  editor.on('change', scheduleRun);
  renderGallery();
  renderTabs();
  initResize();
  runSketch();
  timerStart = Date.now();
  requestAnimationFrame(updateTimer);
}
window.addEventListener('DOMContentLoaded', init);
</script>
