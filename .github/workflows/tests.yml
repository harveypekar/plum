name: Tests

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest numpy Pillow

      - name: Run unit tests
        run: |
          python -m pytest \
            projects/rp/tests/ \
            projects/3dml/tests/ \
            scripts/ci/test_pr_review.py \
            --ignore=projects/3dml/tests/test_ui.py \
            -v --tb=short

      - name: Run hook tests
        run: bash .claude/hooks/tests/test-enforce-claude-author.sh
