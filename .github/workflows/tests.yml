name: Tests

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r projects/aiserver/requirements.txt
          pip install -r projects/rp/requirements.txt
          pip install -r projects/3dml/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run aiserver tests
        working-directory: projects/aiserver
        run: python -m pytest tests/ -v --tb=short

      - name: Run RP tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        working-directory: projects/rp
        run: python -m pytest tests/ -v --tb=short

      - name: Run 3dml tests
        working-directory: projects/3dml
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_ui.py

      - name: Run hook tests
        run: bash .claude/hooks/tests/test-enforce-claude-author.sh
